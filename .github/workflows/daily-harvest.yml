name: 8K Cloud Map Harvester

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch: # Allows manual trigger for testing

jobs:
  harvest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run 8K Downloader
        run: python live-cloud-maps-downloader.py

      - name: Get timestamp
        id: timestamp
        run: echo "value=$(date +'%Y%m%d_%H%M')" >> $GITHUB_OUTPUT

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: maps-${{ steps.timestamp.outputs.value }}
          name: Earth Maps ${{ steps.timestamp.outputs.value }}
          files: downloads/**/*
